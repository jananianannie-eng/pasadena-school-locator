<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #222;
    }

    h2 {
      margin-top: 0;
    }

    input,
    select,
    button {
      display: block;
      width: 390px;
      max-width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #2f6fed;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #box {
      margin-top: 15px;
      padding: 14px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      max-width: 720px;
      line-height: 1.45;
    }

    #map {
      height: 500px;
      margin-top: 15px;
      border: 1px solid #ccc;
    }

    .success {
      color: #087a28;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .small {
      color: #555;
      font-size: 13px;
    }

    .school-card {
      margin-top: 10px;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .school-card h3 {
      margin: 0 0 8px 0;
    }

    .school-card p {
      margin: 7px 0;
    }

    .school-card a {
      color: #2f6fed;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Pasadena Zoned School Locator</h2>

  <input id="address" placeholder="Enter address, e.g. 7137 N Rosemead Blvd, San Gabriel" />

  <select id="level">
    <option value="High">High School</option>
    <option value="Middle">Middle School</option>
    <option value="Elementary">Elementary School</option>
  </select>

  <button id="findBtn" onclick="findSchool()" disabled>Loading zoning data...</button>

  <div id="box">Loading zoning data...</div>
  <div id="map"></div>

  <script>
    // =====================================================
    // FILES IN YOUR GITHUB REPO
    // These cleaned GeoJSON files should be in the same folder as index.html:
    // high.json
    // middle.json
    // elementary.json
    // =====================================================
    const zoneFiles = {
      High: "./high.json",
      Middle: "./middle.json",
      Elementary: "./elementary.json"
    };

    // =====================================================
    // ADD OR EDIT SCHOOL INFORMATION HERE
    // Use \n inside descriptions for a new line.
    // The names here should match the cleaned GeoJSON names.
    // =====================================================
    const schoolInfo = {
      "Pasadena High School": {
        description: "PHS offers a variety of outstanding curricular and extra-curricular programs.\nAdvanced Placement classes, language courses, college-level Math Academy courses,\nand strong athletic programs.",
        address: "2925 E Sierra Madre Blvd",
        phone: "(626) 396-5880",
        grades: "9–12",
        website: ""
      },

      "Blair High School": {
        description: "Add your description here.",
        address: "",
        phone: "",
        grades: "9–12",
        website: ""
      },

      "John Muir High School": {
        description: "Add your description here.",
        address: "",
        phone: "",
        grades: "9–12",
        website: ""
      },

      "Octavia E. Butler Middle School": {
        description: "Add your description here.",
        address: "",
        phone: "",
        grades: "6–8",
        website: ""
      },

      "Altadena Elementary School": {
        description: "Add your description here.",
        address: "",
        phone: "",
        grades: "K–5",
        website: ""
      }

      // To add another school, copy this format:
      // ,
      // "School Name Here": {
      //   description: "Line one.\nLine two.",
      //   address: "School address here",
      //   phone: "Phone number here",
      //   grades: "Grades here",
      //   website: "Website link here"
      // }
    };

    // =====================================================
    // APP DATA
    // You usually do not need to edit below this line.
    // =====================================================
    const zones = {
      High: [],
      Middle: [],
      Elementary: []
    };

    let zonesLoaded = null;
    let zonesAreLoaded = false;
    let userMarker = null;
    let selectedZoneLayer = null;

    const box = document.getElementById("box");
    const findBtn = document.getElementById("findBtn");

    const map = L.map("map").setView([34.1478, -118.1445], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    function showMessage(html) {
      box.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDescription(text) {
      return escapeHtml(text || "No description has been added yet.").replaceAll("\n", "<br>");
    }

    function makeWebsiteLink(url) {
      if (!url) return "";

      return (
        "<p><b>Website:</b> " +
        "<a href='" + escapeHtml(url) + "' target='_blank' rel='noopener noreferrer'>School website</a>" +
        "</p>"
      );
    }

    async function fetchJson(path) {
      const response = await fetch(path + "?v=" + Date.now(), {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(path + " failed to load. Status: " + response.status);
      }

      return await response.json();
    }

    async function loadZones() {
      try {
        zonesAreLoaded = false;
        findBtn.disabled = true;
        findBtn.textContent = "Loading zoning data...";

        showMessage("Loading <b>high.json</b>...");
        const highData = await fetchJson(zoneFiles.High);

        showMessage("✅ high.json loaded<br>Loading <b>middle.json</b>...");
        const middleData = await fetchJson(zoneFiles.Middle);

        showMessage("✅ high.json loaded<br>✅ middle.json loaded<br>Loading <b>elementary.json</b>...");
        const elementaryData = await fetchJson(zoneFiles.Elementary);

        zones.High = highData.features || [];
        zones.Middle = middleData.features || [];
        zones.Elementary = elementaryData.features || [];

        zonesAreLoaded = true;
        findBtn.disabled = false;
        findBtn.textContent = "Find School";

        console.log("Loaded zones:", {
          High: zones.High.length,
          Middle: zones.Middle.length,
          Elementary: zones.Elementary.length
        });

        showMessage(
          "<span class='success'>✅ Zoning data loaded.</span><br>" +
          "High zones: " + zones.High.length + "<br>" +
          "Middle zones: " + zones.Middle.length + "<br>" +
          "Elementary zones: " + zones.Elementary.length + "<br><br>" +
          "Enter an address and choose a school level."
        );
      } catch (error) {
        console.error("Zone loading error:", error);

        zonesAreLoaded = false;
        findBtn.disabled = true;
        findBtn.textContent = "Zoning files failed to load";

        showMessage(
          "<span class='error'>❌ Zoning files failed to load.</span><br><br>" +
          escapeHtml(error.message || error) +
          "<br><br>Make sure these files are in the same GitHub folder as index.html:<br>" +
          "<b>high.json</b><br>" +
          "<b>middle.json</b><br>" +
          "<b>elementary.json</b>"
        );
      }
    }

    zonesLoaded = loadZones();

    // =====================================================
    // GEOCODING
    // This intentionally does NOT restrict to one city.
    // It tries broad searches so addresses from uploaded KML/GeoJSON zones
    // can resolve even if they are in Pasadena, Altadena, Sierra Madre,
    // San Gabriel, or another nearby Los Angeles County area.
    // =====================================================
    async function geocodeAddress(address) {
      const queries = [
        address,
        address + ", CA, USA",
        address + ", Los Angeles County, CA, USA",
        address + ", Pasadena Unified School District, CA, USA"
      ];

      for (const query of queries) {
        const url =
          "https://nominatim.openstreetmap.org/search" +
          "?format=json" +
          "&limit=10" +
          "&addressdetails=1" +
          "&countrycodes=us" +
          "&q=" + encodeURIComponent(query);

        const response = await fetch(url, {
          headers: { Accept: "application/json" }
        });

        if (!response.ok) {
          continue;
        }

        const results = await response.json();

        if (results && results.length > 0) {
          // Prefer results in Los Angeles County or nearby PUSD-related cities,
          // but do not require a specific city name.
          const localResult = results.find(function(result) {
            const label = (result.display_name || "").toLowerCase();
            return (
              label.includes("los angeles county") ||
              label.includes("pasadena") ||
              label.includes("altadena") ||
              label.includes("sierra madre") ||
              label.includes("san gabriel")
            );
          });

          const best = localResult || results[0];

          return {
            lat: Number(best.lat),
            lng: Number(best.lon),
            label: best.display_name || query
          };
        }
      }

      return null;
    }

    function pointInRing(point, ring) {
      const x = point[0];
      const y = point[1];
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
        const yj = ring[j][1];

        const intersect =
          ((yi > y) !== (yj > y)) &&
          (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi);

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function pointInPolygon(point, polygon) {
      if (!polygon || polygon.length === 0) return false;

      const outerRing = polygon[0];
      if (!outerRing || outerRing.length < 3) return false;

      if (!pointInRing(point, outerRing)) return false;

      for (let i = 1; i < polygon.length; i++) {
        const hole = polygon[i];
        if (hole && hole.length >= 3 && pointInRing(point, hole)) {
          return false;
        }
      }

      return true;
    }

    function getSchoolName(properties) {
      if (!properties) return "Unknown School";

      return (
        properties.name ||
        properties.Name ||
        properties.SCHOOL ||
        properties.School ||
        properties.school ||
        properties.SCHOOLNAME ||
        properties.SCHOOL_NAME ||
        properties.school_name ||
        properties.SITE_NAME ||
        properties.site_name ||
        "Unknown School"
      );
    }

    function getSchoolDetails(schoolName) {
      return schoolInfo[schoolName] || {
        description: "No description has been added yet.",
        address: "N/A",
        phone: "N/A",
        grades: "N/A",
        website: ""
      };
    }

    function findZonedSchool(lat, lng, level) {
      const levelZones = zones[level];
      if (!levelZones || levelZones.length === 0) return null;

      const tolerance = 0.0005;
      const testPoints = [
        [lng, lat],
        [lng + tolerance, lat],
        [lng - tolerance, lat],
        [lng, lat + tolerance],
        [lng, lat - tolerance],
        [lng + tolerance, lat + tolerance],
        [lng - tolerance, lat - tolerance],
        [lng + tolerance, lat - tolerance],
        [lng - tolerance, lat + tolerance]
      ];

      for (const zone of levelZones) {
        const geometry = zone.geometry;
        if (!geometry) continue;

        if (geometry.type === "Polygon") {
          for (const point of testPoints) {
            if (pointInPolygon(point, geometry.coordinates)) {
              return {
                name: getSchoolName(zone.properties),
                feature: zone
              };
            }
          }
        }

        if (geometry.type === "MultiPolygon") {
          for (const polygon of geometry.coordinates) {
            for (const point of testPoints) {
              if (pointInPolygon(point, polygon)) {
                return {
                  name: getSchoolName(zone.properties),
                  feature: zone
                };
              }
            }
          }
        }
      }

      return null;
    }

    function drawSearchPoint(lat, lng, label) {
      if (userMarker) map.removeLayer(userMarker);

      userMarker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(escapeHtml(label))
        .openPopup();

      map.setView([lat, lng], 15);
    }

    function drawSelectedZone(feature) {
      if (selectedZoneLayer) map.removeLayer(selectedZoneLayer);

      selectedZoneLayer = L.geoJSON(feature, {
        style: {
          color: "#2f6fed",
          weight: 3,
          fillOpacity: 0.15
        }
      }).addTo(map);
    }

    function buildSchoolCard(schoolName, level, location) {
      const info = getSchoolDetails(schoolName);

      return (
        "<span class='success'>✅ Zoned School Found</span>" +
        "<div class='school-card'>" +
          "<h3>" + escapeHtml(schoolName) + "</h3>" +
          "<p><b>School level:</b> " + escapeHtml(level) + " School</p>" +
          "<p><b>Description:</b><br>" + formatDescription(info.description) + "</p>" +
          "<p><b>Address:</b> " + escapeHtml(info.address || "N/A") + "</p>" +
          "<p><b>Phone:</b> " + escapeHtml(info.phone || "N/A") + "</p>" +
          "<p><b>Grades:</b> " + escapeHtml(info.grades || "N/A") + "</p>" +
          makeWebsiteLink(info.website) +
        "</div>" +
        "<br>" +
        "<span class='small'>" +
          "<b>Geocoded location:</b><br>" +
          escapeHtml(location.label) +
          "<br>Lat: " + location.lat.toFixed(6) +
          ", Lng: " + location.lng.toFixed(6) +
        "</span>"
      );
    }

    async function findSchool() {
      try {
        await zonesLoaded;

        if (!zonesAreLoaded) {
          showMessage("<span class='error'>❌ Zoning data is not loaded yet.</span>");
          return;
        }

        const address = document.getElementById("address").value.trim();
        const level = document.getElementById("level").value;

        if (!address) {
          alert("Please enter an address.");
          return;
        }

        showMessage("Searching address...");

        const location = await geocodeAddress(address);

        if (!location) {
          showMessage(
            "<span class='error'>❌ Address not found.</span><br>" +
            "Try entering the full address with city, state, and ZIP code."
          );
          return;
        }

        drawSearchPoint(location.lat, location.lng, location.label);
        showMessage("Checking school boundary...");

        const result = findZonedSchool(location.lat, location.lng, level);

        if (!result) {
          showMessage(
            "<span class='error'>❌ No zoned school found.</span><br><br>" +
            "The address was found, but it did not land inside any " +
            escapeHtml(level) +
            " school boundary from your uploaded zone files.<br><br>" +
            "<b>Geocoded location:</b><br>" +
            escapeHtml(location.label) +
            "<br><br>" +
            "<b>Coordinates:</b><br>" +
            "Lat: " + location.lat.toFixed(6) + "<br>" +
            "Lng: " + location.lng.toFixed(6)
          );
          return;
        }

        drawSelectedZone(result.feature);
        showMessage(buildSchoolCard(result.name, level, location));
      } catch (error) {
        console.error(error);
        showMessage(
          "<span class='error'>❌ Error:</span><br>" +
          escapeHtml(error.message || error)
        );
      }
    }
  </script>
</body>
</html>
