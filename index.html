<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #222;
    }

    h2 {
      margin-top: 0;
    }

    input,
    select,
    button {
      display: block;
      width: 360px;
      max-width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #2f6fed;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #box {
      margin-top: 15px;
      padding: 14px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      max-width: 560px;
      line-height: 1.45;
    }

    #map {
      height: 500px;
      margin-top: 15px;
      border: 1px solid #ccc;
    }

    .success { color: #087a28; font-weight: bold; }
    .error { color: #b00020; font-weight: bold; }
    .small { color: #555; font-size: 13px; }
  </style>
</head>

<body>
  <h2>Pasadena Zoned School Locator</h2>

  <input id="address" placeholder="Enter address, e.g. 214 Marathon Road" />

  <select id="level">
    <option value="High">High School</option>
    <option value="Middle">Middle School</option>
    <option value="Elementary">Elementary School</option>
  </select>

  <button id="findBtn" onclick="findSchool()" disabled>Loading zoning data...</button>

  <div id="box">Loading zoning data...</div>
  <div id="map"></div>

  <script>
    // =====================================================
    // IMPORTANT FOR GITHUB PAGES
    // Your repo should look like this:
    // index.html
    // high.json
    // middle.json
    // elementary.json
    // =====================================================

    const zoneFiles = {
      High: "./high.json",
      Middle: "./middle.json",
      Elementary: "./elementary.json"
    };

    const zones = {
      High: [],
      Middle: [],
      Elementary: []
    };

    let zonesAreLoaded = false;
    let userMarker = null;
    let selectedZoneLayer = null;

    const box = document.getElementById("box");
    const findBtn = document.getElementById("findBtn");

    // ---------------- MAP ----------------
    const map = L.map("map").setView([34.1478, -118.1445], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // ---------------- BASIC HELPERS ----------------
    function showMessage(html) {
      box.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchJson(path) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      try {
        const response = await fetch(path + "?v=" + Date.now(), {
          cache: "no-store",
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`${path} failed to load. Status: ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeoutId);
        throw new Error(`${path} could not be loaded. ${error.message}`);
      }
    }

    // ---------------- LOAD ZONE FILES ----------------
    async function loadZones() {
      try {
        showMessage("Checking zoning files...<br>Loading <b>high.json</b>...");
        findBtn.disabled = true;
        findBtn.textContent = "Loading zoning data...";

        const highData = await fetchJson(zoneFiles.High);

        showMessage("Checking zoning files...<br>✅ high.json loaded<br>Loading <b>middle.json</b>...");
        const middleData = await fetchJson(zoneFiles.Middle);

        showMessage("Checking zoning files...<br>✅ high.json loaded<br>✅ middle.json loaded<br>Loading <b>elementary.json</b>...");
        const elementaryData = await fetchJson(zoneFiles.Elementary);

        zones.High = highData.features || [];
        zones.Middle = middleData.features || [];
        zones.Elementary = elementaryData.features || [];

        zonesAreLoaded = true;

        console.log("Loaded zones:", {
          High: zones.High.length,
          Middle: zones.Middle.length,
          Elementary: zones.Elementary.length
        });

        findBtn.disabled = false;
        findBtn.textContent = "Find School";

        showMessage(
          "<span class='success'>✅ Zoning data loaded.</span><br>" +
          "High zones: " + zones.High.length + "<br>" +
          "Middle zones: " + zones.Middle.length + "<br>" +
          "Elementary zones: " + zones.Elementary.length + "<br><br>" +
          "Enter an address and choose a school level."
        );
      } catch (error) {
        console.error("Zone loading error:", error);

        findBtn.disabled = true;
        findBtn.textContent = "Zoning files failed to load";

        showMessage(
          "<span class='error'>❌ Zoning files failed to load.</span><br><br>" +
          escapeHtml(error.message || error) +
          "<br><br>" +
          "Try opening these links on your published GitHub Pages site:<br>" +
          "<b>./high.json</b><br>" +
          "<b>./middle.json</b><br>" +
          "<b>./elementary.json</b><br><br>" +
          "If one of them shows 404 or does not open, that file is the problem."
        );
      }
    }

    loadZones();

    // ---------------- GEOCODING ----------------
    async function geocodeAddress(address) {
      // Do NOT force Pasadena here.
      // Some PUSD addresses are in Altadena, Sierra Madre, etc.
      // If the user typed only a street address, we add a general local hint.
      const lowerAddress = address.toLowerCase();
      const hasCityOrZip =
        lowerAddress.includes("pasadena") ||
        lowerAddress.includes("altadena") ||
        lowerAddress.includes("sierra madre") ||
        lowerAddress.includes(" ca") ||
        /[0-9]{5}/.test(address);

      const searchText = hasCityOrZip
        ? address
        : `${address}, Pasadena Unified School District, Los Angeles County, CA, USA`;

      const url =
        "https://nominatim.openstreetmap.org/search" +
        "?format=json" +
        "&limit=10" +
        "&addressdetails=1" +
        "&countrycodes=us" +
        "&q=" + encodeURIComponent(searchText);

      const response = await fetch(url, {
        headers: { Accept: "application/json" }
      });

      if (!response.ok) {
        throw new Error("Address search failed. Please try again.");
      }

      const results = await response.json();

      if (!results || results.length === 0) {
        return null;
      }

      // Prefer local results near Pasadena / Altadena / Sierra Madre.
      const localResult = results.find(result => {
        const label = (result.display_name || "").toLowerCase();
        return (
          label.includes("pasadena") ||
          label.includes("altadena") ||
          label.includes("sierra madre")
        );
      });

      const best = localResult || results[0];

      return {
        lat: Number(best.lat),
        lng: Number(best.lon),
        label: best.display_name || searchText
      };
    }

    // ---------------- GEOMETRY CHECKS ----------------
    function pointInRing(point, ring) {
      const x = point[0]; // longitude
      const y = point[1]; // latitude
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
        const yj = ring[j][1];

        const intersect =
          yi > y !== yj > y &&
          x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function pointInPolygon(point, polygon) {
      if (!polygon || polygon.length === 0) return false;

      const outerRing = polygon[0];
      if (!outerRing || outerRing.length < 3) return false;

      if (!pointInRing(point, outerRing)) return false;

      // Extra rings are holes. If the point is in a hole, it is not in the polygon.
      for (let i = 1; i < polygon.length; i++) {
        const hole = polygon[i];
        if (hole && hole.length >= 3 && pointInRing(point, hole)) {
          return false;
        }
      }

      return true;
    }

    function getSchoolName(properties) {
      if (!properties) return "Unknown School";

      return (
        properties.name ||
        properties.Name ||
        properties.SCHOOL ||
        properties.School ||
        properties.school ||
        properties.SCHOOLNAME ||
        properties.SCHOOL_NAME ||
        properties.school_name ||
        properties.SITE_NAME ||
        properties.site_name ||
        "Unknown School"
      );
    }

    function findZonedSchool(lat, lng, level) {
      const levelZones = zones[level];

      if (!levelZones || levelZones.length === 0) {
        return null;
      }

      // Small tolerance for geocoding/boundary mismatch.
      // This tests the exact point first, then nearby points.
      const tolerance = 0.0005;
      const testPoints = [
        [lng, lat],
        [lng + tolerance, lat],
        [lng - tolerance, lat],
        [lng, lat + tolerance],
        [lng, lat - tolerance],
        [lng + tolerance, lat + tolerance],
        [lng - tolerance, lat - tolerance],
        [lng + tolerance, lat - tolerance],
        [lng - tolerance, lat + tolerance]
      ];

      for (const zone of levelZones) {
        const geometry = zone.geometry;
        if (!geometry) continue;

        if (geometry.type === "Polygon") {
          for (const point of testPoints) {
            if (pointInPolygon(point, geometry.coordinates)) {
              return {
                name: getSchoolName(zone.properties),
                feature: zone
              };
            }
          }
        }

        if (geometry.type === "MultiPolygon") {
          for (const polygon of geometry.coordinates) {
            for (const point of testPoints) {
              if (pointInPolygon(point, polygon)) {
                return {
                  name: getSchoolName(zone.properties),
                  feature: zone
                };
              }
            }
          }
        }
      }

      return null;
    }

    // ---------------- MAP DRAWING ----------------
    function drawSearchPoint(lat, lng, label) {
      if (userMarker) {
        map.removeLayer(userMarker);
      }

      userMarker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(escapeHtml(label))
        .openPopup();

      map.setView([lat, lng], 15);
    }

    function drawSelectedZone(feature) {
      if (selectedZoneLayer) {
        map.removeLayer(selectedZoneLayer);
      }

      selectedZoneLayer = L.geoJSON(feature, {
        style: {
          color: "#2f6fed",
          weight: 3,
          fillOpacity: 0.15
        }
      }).addTo(map);
    }

    // ---------------- MAIN BUTTON ACTION ----------------
    async function findSchool() {
      try {
        if (!zonesAreLoaded) {
          showMessage("<span class='error'>❌ Zoning data is not loaded yet.</span>");
          return;
        }

        const address = document.getElementById("address").value.trim();
        const level = document.getElementById("level").value;

        if (!address) {
          alert("Please enter an address.");
          return;
        }

        showMessage("Searching address...");

        const location = await geocodeAddress(address);

        if (!location) {
          showMessage(
            "<span class='error'>❌ Address not found.</span><br>" +
            "Try entering the full address with ZIP code, like:<br>" +
            "<b>214 Marathon Road, Altadena, CA 91001</b>"
          );
          return;
        }

        console.log("Geocoded location:", location);

        drawSearchPoint(location.lat, location.lng, location.label);

        showMessage("Checking school boundary...");

        const result = findZonedSchool(location.lat, location.lng, level);

        if (!result) {
          showMessage(
            "<span class='error'>❌ No zoned school found.</span><br><br>" +
            "The address was found, but it did not land inside any " +
            escapeHtml(level) +
            " school boundary.<br><br>" +
            "<b>Geocoded location:</b><br>" +
            escapeHtml(location.label) +
            "<br><br>" +
            "<b>Coordinates:</b><br>" +
            "Lat: " + location.lat.toFixed(6) + "<br>" +
            "Lng: " + location.lng.toFixed(6) + "<br><br>" +
            "<span class='small'>Try adding the ZIP code. If it still fails, the GeoJSON boundary may not cover this address.</span>"
          );
          return;
        }

        drawSelectedZone(result.feature);

        showMessage(
          "<span class='success'>✅ Zoned School Found</span><br><br>" +
          "<b>School level:</b> " + escapeHtml(level) + " School<br>" +
          "<b>Zoned school:</b> " + escapeHtml(result.name) + "<br><br>" +
          "<span class='small'>" +
          "<b>Geocoded location:</b><br>" +
          escapeHtml(location.label) +
          "<br>Lat: " + location.lat.toFixed(6) +
          ", Lng: " + location.lng.toFixed(6) +
          "</span>"
        );
      } catch (error) {
        console.error(error);
        showMessage(
          "<span class='error'>❌ Error:</span><br>" +
          escapeHtml(error.message || error)
        );
      }
    }
  </script>
</body>
</html>
