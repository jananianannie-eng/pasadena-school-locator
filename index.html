<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pasadena Zoned School Locator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:20px; }
#map { height:500px; margin-top:15px; }
button { padding:10px; margin-top:10px; }
</style>
</head>

<body>

<h2>Pasadena Zoned School Locator</h2>

<input id="address" placeholder="Enter address" style="width:300px;padding:8px;" />

<select id="level">
<option value="High">High School</option>
<option value="Middle">Middle School</option>
<option value="Elementary">Elementary School</option>
</select>

<br>
<button onclick="findSchool()">Find Zoned School</button>

<div id="box">Loading zoning data...</div>
<div id="map"></div>

<script>

const zoneFiles = {
  High: "./high.json",
  Middle: "./middle.json",
  Elementary: "./elementary.json"
};

let zones = { High:[], Middle:[], Elementary:[] };
let map = L.map('map').setView([34.1478,-118.1445],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function escapeHtml(v){
  return String(v)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");
}

async function loadZones(){
  for (let level in zoneFiles){
    let res = await fetch(zoneFiles[level]);
    let data = await res.json();
    zones[level] = data.features;

    L.geoJSON(data).addTo(map);
  }
  document.getElementById("box").innerHTML="Ready";
}

function pointInPoly(point, vs){
  let x=point[0], y=point[1], inside=false;
  for (let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];
    let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

function findZone(level,lat,lng){
  let pt=[lng,lat];
  for (let f of zones[level]){
    let coords=f.geometry.coordinates;
    for (let poly of coords){
      if(pointInPoly(pt,poly[0])) return f;
    }
  }
  return null;
}

async function findSchool(){
  let addr=document.getElementById("address").value;

  let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr);
  let res=await fetch(url);
  let data=await res.json();

  if(!data.length){
    document.getElementById("box").innerHTML="Address not found";
    return;
  }

  let lat=parseFloat(data[0].lat);
  let lng=parseFloat(data[0].lon);

  map.setView([lat,lng],15);
  L.marker([lat,lng]).addTo(map);

  let level=document.getElementById("level").value;
  let zone=findZone(level,lat,lng);

  if(!zone){
    document.getElementById("box").innerHTML="No zone found";
    return;
  }

  let name=zone.properties.name || "School";

  document.getElementById("box").innerHTML=
    "<b>"+escapeHtml(name)+"</b><br>"+level+" School";
}

loadZones();

</script>

</body>
</html>
