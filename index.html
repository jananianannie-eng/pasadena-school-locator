<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pasadena Zoned School Locator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
#map { height: 500px; margin-top: 15px; }
#box { margin-top: 10px; padding: 12px; border: 1px solid #ccc; max-width: 650px; background:#f9f9f9; }
input, select, button { padding: 8px; margin: 5px 0; width: 320px; }
button { background:#2f6fed; color:white; border:none; cursor:pointer; }
.success { color:green; font-weight:bold; }
.error { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>Pasadena Zoned School Locator</h2>

<input id="address" placeholder="Enter address"/>
<select id="level">
<option value="High">High School</option>
<option value="Middle">Middle School</option>
<option value="Elementary">Elementary School</option>
</select>

<button onclick="findSchool()" id="btn" disabled>Loading...</button>

<div id="box">Loading zoning data...</div>
<div id="map"></div>

<script>

// ========================= FILES =========================
const zoneFiles = {
  High: "./high.json",
  Middle: "./middle.json",
  Elementary: "./elementary.json"
};

const correctionsFile = "./address-corrections.csv";

// ========================= DATA =========================
let zones = { High:[], Middle:[], Elementary:[] };
let corrections = [];
let loaded = false;

// ========================= MAP =========================
const map = L.map("map").setView([34.1478,-118.1445],12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19
}).addTo(map);

let marker, zoneLayer, districtLayer;

// ========================= HELPERS =========================
function msg(html){ document.getElementById("box").innerHTML = html; }

function normalize(s){
  return (s||"").toLowerCase()
    .replaceAll("east","e")
    .replaceAll("west","w")
    .replaceAll("avenue","ave")
    .replace(/[^a-z0-9]+/g," ");
}

function getNumber(a){
  const m = a.match(/^(\d+)/);
  return m ? Number(m[1]) : null;
}

// ========================= CSV =========================
async function loadCorrections(){
  try{
    const r = await fetch(correctionsFile + "?v="+Date.now());
    if(!r.ok){ corrections=[]; return; }

    const txt = await r.text();
    const lines = txt.split("\n").slice(1);

    corrections = lines.map(l=>{
      const p = l.split(",");
      if(p.length<7) return null;
      return {
        street:p[0],
        level:p[1],
        school:p[2],
        evenStart:+p[3],
        evenEnd:+p[4],
        oddStart:+p[5],
        oddEnd:+p[6]
      };
    }).filter(Boolean);

  }catch{ corrections=[]; }
}

function checkCorrection(address, level){
  const num = getNumber(address);
  if(!num) return null;

  const n = normalize(address);

  for(const c of corrections){
    if(c.level!==level) continue;
    if(!n.includes(c.street)) continue;

    if(num%2===0 && num>=c.evenStart && num<=c.evenEnd) return c.school;
    if(num%2===1 && num>=c.oddStart && num<=c.oddEnd) return c.school;
  }

  return null;
}

// ========================= LOAD ZONES =========================
async function loadZones(){

  const [h,m,e] = await Promise.all([
    fetch(zoneFiles.High).then(r=>r.json()),
    fetch(zoneFiles.Middle).then(r=>r.json()),
    fetch(zoneFiles.Elementary).then(r=>r.json())
  ]);

  zones.High = h.features;
  zones.Middle = m.features;
  zones.Elementary = e.features;

  await loadCorrections();

  drawDistrict();

  loaded = true;
  document.getElementById("btn").disabled = false;
  document.getElementById("btn").innerText = "Find School";

  msg("<span class='success'>Ready</span>");
}

loadZones();

// ========================= GEOMETRY =========================
function inside(point, vs){
  let x=point[0], y=point[1], inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect = ((yi>y)!=(yj>y)) &&
      (x<(xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside=!inside;
  }
  return inside;
}

function inPolygon(lng,lat,poly){
  return inside([lng,lat],poly[0]);
}

function findZone(lat,lng,level){
  for(const z of zones[level]){
    const g=z.geometry;

    const polys = g.type==="Polygon"
      ? [g.coordinates]
      : g.coordinates;

    for(const p of polys){
      if(inPolygon(lng,lat,p)){
        return {
          name: z.properties.name,
          feature: z
        };
      }
    }
  }
  return null;
}

function insideAny(lat,lng){
  return findZone(lat,lng,"High") ||
         findZone(lat,lng,"Middle") ||
         findZone(lat,lng,"Elementary");
}

// ========================= GEOCODE =========================
async function geocode(addr){
  const url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr);

  const r = await fetch(url);
  const d = await r.json();

  if(!d.length) return null;

  return {
    lat:+d[0].lat,
    lng:+d[0].lon,
    label:d[0].display_name
  };
}

// ========================= DRAW =========================
function drawPoint(lat,lng,label){
  if(marker) map.removeLayer(marker);
  marker = L.marker([lat,lng]).addTo(map).bindPopup(label).openPopup();
  map.setView([lat,lng],15);
}

function drawZone(f){
  if(zoneLayer) map.removeLayer(zoneLayer);
  zoneLayer = L.geoJSON(f,{style:{color:"blue"}}).addTo(map);
}

function drawDistrict(){
  const all = [].concat(zones.High,zones.Middle,zones.Elementary);

  districtLayer = L.geoJSON(all,{
    style:{color:"#999", weight:1, fillOpacity:0.05}
  }).addTo(map);

  districtLayer.bringToBack();
}

// ========================= MAIN =========================
async function findSchool(){

  if(!loaded) return;

  const address = document.getElementById("address").value;
  const level = document.getElementById("level").value;

  msg("Searching...");

  const loc = await geocode(address);

  if(!loc){
    msg("<span class='error'>Address not found</span>");
    return;
  }

  drawPoint(loc.lat,loc.lng,loc.label);

  if(!insideAny(loc.lat,loc.lng)){
    msg("<span class='error'>Outside PUSD boundary</span>");
    return;
  }

  let result = findZone(loc.lat,loc.lng,level);

  if(!result){
    msg("<span class='error'>No zone found</span>");
    return;
  }

  const override = checkCorrection(address,level);

  const school = override || result.name;

  drawZone(result.feature);

  msg("<b>School:</b> "+school);
}

</script>

</body>
</html>
