<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    #map { height: 500px; margin-top: 15px; }
    #box { margin-top: 10px; padding: 12px; border: 1px solid #ccc; width: 520px; background: #f9f9f9; }
    input, select, button { padding: 8px; margin: 5px 0; width: 320px; }
  </style>
</head>

<body>

<h2>Zoned School Locator</h2>

<input id="address" placeholder="Enter address (Pasadena)" />
<br>

<select id="level">
  <option value="High">High School</option>
  <option value="Middle">Middle School</option>
  <option value="Elementary">Elementary School</option>
</select>

<br>

<button onclick="findSchool()">Find School</button>

<div id="box">Enter an address to begin</div>
<div id="map"></div>

<script>

// ---------------- MAP ----------------
const map = L.map("map").setView([34.1478, -118.1445], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

let userMarker;

// ---------------- DATA STORAGE ----------------
let zones = {
  High: [],
  Middle: [],
  Elementary: []
};

// ---------------- LOAD JSON FILES ----------------
async function loadZones() {

  const [high, middle, elementary] = await Promise.all([
    fetch("high.json").then(r => r.json()),
    fetch("middle.json").then(r => r.json()),
    fetch("elementary.json").then(r => r.json())
  ]);

  zones.High = high.features;
  zones.Middle = middle.features;
  zones.Elementary = elementary.features;

  // Optional: draw boundaries
  L.geoJSON(high, { style: { color: "red", weight: 2 } }).addTo(map);
  L.geoJSON(middle, { style: { color: "orange", weight: 2 } }).addTo(map);
  L.geoJSON(elementary, { style: { color: "green", weight: 2 } }).addTo(map);

  console.log("Zones loaded");
}

loadZones();

// ---------------- GEOCODE ----------------
async function geocode(address) {

  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
    encodeURIComponent(address + ", Pasadena, CA")
  );

  const data = await res.json();
  return data[0] || null;
}

// ---------------- POINT IN POLYGON ----------------
function pointInPolygon(point, vs) {

  const x = point[0], y = point[1];
  let inside = false;

  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    const xi = vs[i][0], yi = vs[i][1];
    const xj = vs[j][0], yj = vs[j][1];

    const intersect =
      ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

// ---------------- FIND ZONED SCHOOL ----------------
function findZonedSchool(lat, lng, level) {

  const levelZones = zones[level];

  if (!levelZones || levelZones.length === 0) return null;

  for (let zone of levelZones) {

    const coords = zone.geometry.coordinates;

    // handle Polygon vs MultiPolygon
    const polygon = zone.geometry.type === "MultiPolygon"
      ? coords[0][0]
      : coords[0];

    if (pointInPolygon([lng, lat], polygon)) {
      return zone.properties.name || zone.properties.Name;
    }
  }

  return null;
}

// ---------------- MAIN FUNCTION ----------------
async function findSchool() {

  const address = document.getElementById("address").value;
  const level = document.getElementById("level").value;

  if (!address) return alert("Enter address");

  document.getElementById("box").innerHTML = "Searching...";

  const geo = await geocode(address);

  if (!geo) {
    document.getElementById("box").innerHTML = "Address not found";
    return;
  }

  const lat = parseFloat(geo.lat);
  const lng = parseFloat(geo.lon);

  if (userMarker) map.removeLayer(userMarker);

  userMarker = L.marker([lat, lng])
    .addTo(map)
    .bindPopup("Search Location")
    .openPopup();

  map.setView([lat, lng], 13);

  const school = findZonedSchool(lat, lng, level);

  if (!school) {
    document.getElementById("box").innerHTML =
      "No zoned school found for this location.";
    return;
  }

  document.getElementById("box").innerHTML =
    "<b>Zoned School:</b> " + school;
}

</script>

</body>
</html>
