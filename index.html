<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #222;
    }

    h2 {
      margin-bottom: 10px;
    }

    .controls {
      max-width: 540px;
      margin-bottom: 12px;
    }

    input,
    select,
    button {
      box-sizing: border-box;
      padding: 9px;
      margin: 5px 0;
      width: 100%;
      max-width: 360px;
      font-size: 15px;
    }

    button {
      cursor: pointer;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background: #1557b0;
    }

    #box {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #ccc;
      max-width: 540px;
      background: #f9f9f9;
      line-height: 1.4;
    }

    #map {
      height: 500px;
      margin-top: 15px;
      border: 1px solid #ccc;
    }

    .success {
      color: #0a7a28;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>
  <h2>Pasadena Zoned School Locator</h2>

  <div class="controls">
    <input id="address" placeholder="Enter address, e.g. 214 Marathon Road" />

    <br />

    <select id="level">
      <option value="High">High School</option>
      <option value="Middle">Middle School</option>
      <option value="Elementary">Elementary School</option>
    </select>

    <br />

    <button onclick="findSchool()">Find School</button>
  </div>

  <div id="box">Loading zoning data...</div>
  <div id="map"></div>

  <script>
    // ---------------- MAP ----------------
    const map = L.map("map").setView([34.1478, -118.1445], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let userMarker = null;
    let zoneLayer = null;

    // ---------------- DATA STORAGE ----------------
    const zones = {
      High: [],
      Middle: [],
      Elementary: []
    };

    let zonesLoaded = null;

    const zoneFiles = {
      High: "high.json",
      Middle: "middle.json",
      Elementary: "elementary.json"
    };

    // ---------------- UI HELPERS ----------------
    function setMessage(html) {
      document.getElementById("box").innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // ---------------- LOAD GEOJSON FILES ----------------
    async function loadZones() {
      try {
        const [highData, middleData, elementaryData] = await Promise.all([
          fetch(zoneFiles.High).then(checkFetch).then(r => r.json()),
          fetch(zoneFiles.Middle).then(checkFetch).then(r => r.json()),
          fetch(zoneFiles.Elementary).then(checkFetch).then(r => r.json())
        ]);

        zones.High = highData.features || [];
        zones.Middle = middleData.features || [];
        zones.Elementary = elementaryData.features || [];

        console.log("Loaded zone counts:", {
          High: zones.High.length,
          Middle: zones.Middle.length,
          Elementary: zones.Elementary.length
        });

        setMessage("<span class='success'>✅ Zoning data loaded.</span> Enter an address.");
      } catch (error) {
        console.error("GeoJSON load error:", error);
        setMessage(
          "<span class='error'>❌ Failed to load zoning files.</span><br>" +
          "Make sure high.json, middle.json, and elementary.json are in the same folder as this HTML file."
        );
      }
    }

    function checkFetch(response) {
      if (!response.ok) {
        throw new Error(`Could not load ${response.url}: ${response.status}`);
      }
      return response;
    }

    zonesLoaded = loadZones();

    // ---------------- GEOCODE ----------------
    async function geocode(address) {
      const fullAddress = `${address}, Pasadena, CA, USA`;

      // Nominatim tends to be more precise for street addresses than Photon.
      const url =
        "https://nominatim.openstreetmap.org/search" +
        "?format=json" +
        "&limit=5" +
        "&addressdetails=1" +
        "&countrycodes=us" +
        "&q=" + encodeURIComponent(fullAddress);

      const response = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("Geocoding request failed.");
      }

      const results = await response.json();

      if (!Array.isArray(results) || results.length === 0) {
        return null;
      }

      // Prefer results that are actually in Pasadena when available.
      const pasadenaResult = results.find(result => {
        const addressData = result.address || {};
        const city = addressData.city || addressData.town || addressData.village || "";
        return city.toLowerCase().includes("pasadena");
      });

      const best = pasadenaResult || results[0];

      return {
        lat: parseFloat(best.lat),
        lng: parseFloat(best.lon),
        label: best.display_name || fullAddress,
        raw: best
      };
    }

    // ---------------- POINT IN RING ----------------
    function pointInRing(point, ring) {
      const [x, y] = point; // x = longitude, y = latitude
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = ring[i];
        const [xj, yj] = ring[j];

        const intersects =
          ((yi > y) !== (yj > y)) &&
          (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi);

        if (intersects) inside = !inside;
      }

      return inside;
    }

    // GeoJSON polygons can have holes.
    // The first ring is the outer boundary.
    // Any additional rings are holes and should be excluded.
    function pointInPolygonWithHoles(point, polygonCoordinates) {
      if (!polygonCoordinates || polygonCoordinates.length === 0) return false;

      const outerRing = polygonCoordinates[0];
      if (!outerRing || outerRing.length < 3) return false;

      if (!pointInRing(point, outerRing)) return false;

      for (let i = 1; i < polygonCoordinates.length; i++) {
        const hole = polygonCoordinates[i];
        if (hole && hole.length >= 3 && pointInRing(point, hole)) {
          return false;
        }
      }

      return true;
    }

    // ---------------- SCHOOL NAME HELPER ----------------
    function getSchoolName(properties) {
      if (!properties) return "Unknown School";

      // Try common field names used in GeoJSON exports.
      return (
        properties.name ||
        properties.Name ||
        properties.SCHOOL ||
        properties.School ||
        properties.school ||
        properties.SCHOOLNAME ||
        properties.SCHOOL_NAME ||
        properties.site_name ||
        properties.SiteName ||
        "Unknown School"
      );
    }

      const levelZones = zones[level];
      const point = [lng, lat];
