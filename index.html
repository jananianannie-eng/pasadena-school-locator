<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #222;
    }

    h2 {
      margin-top: 0;
    }

    input,
    select,
    button {
      display: block;
      width: 360px;
      max-width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #2f6fed;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #box {
      margin-top: 15px;
      padding: 14px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      max-width: 560px;
      line-height: 1.45;
    }

    #map {
      height: 500px;
      margin-top: 15px;
      border: 1px solid #ccc;
    }

    .success { color: #087a28; font-weight: bold; }
    .error { color: #b00020; font-weight: bold; }
    .small { color: #555; font-size: 13px; }
  </style>
</head>

<body>
  <h2>Pasadena Zoned School Locator</h2>

  <input id="address" placeholder="Enter address, e.g. 214 Marathon Road" />

  <select id="level">
    <option value="High">High School</option>
    <option value="Middle">Middle School</option>
    <option value="Elementary">Elementary School</option>
  </select>

  <button id="findBtn" onclick="findSchool()" disabled>Loading zoning data...</button>

  <div id="box">Loading zoning data...</div>
  <div id="map"></div>

  <script>
    // =====================================================
    // IMPORTANT FOR GITHUB PAGES
    // Your repo should look like this:
    // index.html
    // high.json
    // middle.json
    // elementary.json
    // =====================================================

    const zoneFiles = {
      High: "./high.json",
      Middle: "./middle.json",
      Elementary: "./elementary.json"
    };

    const zones = {
      High: [],
      Middle: [],
      Elementary: []
    };

    let zonesAreLoaded = false;
    let userMarker = null;
    let selectedZoneLayer = null;

    const box = document.getElementById("box");
    const findBtn = document.getElementById("findBtn");

    // ---------------- MAP ----------------
    const map = L.map("map").setView([34.1478, -118.1445], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // ---------------- BASIC HELPERS ----------------
    function showMessage(html) {
      box.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(`${path} failed to load. Status: ${response.status}`);
      }

      return response.json();
    }

    // ---------------- LOAD ZONE FILES ----------------
    async function loadZones() {
      try {
        showMessage("Loading zoning data...");
        findBtn.disabled = true;
        findBtn.textContent = "Loading zoning data...";

        const highData = await fetchJson(zoneFiles.High);
        const middleData = await fetchJson(zoneFiles.Middle);
        const elementaryData = await fetchJson(zoneFiles.Elementary);

        zones.High = highData.features || [];
        zones.Middle = middleData.features || [];
        zones.Elementary = elementaryData.features || [];

        zonesAreLoaded = true;

        console.log("Loaded zones:", {
          High: zones.High.length,
          Middle: zones.Middle.length,
          Elementary: zones.Elementary.length
        });

        findBtn.disabled = false;
        findBtn.textContent = "Find School";

        showMessage(
          "<span class='success'>✅ Zoning data loaded.</span><br>" +
          "Enter an address and choose a school level."
        );
      } catch (error) {
        console.error("Zone loading error:", error);

        findBtn.disabled = true;
        findBtn.textContent = "Zoning files failed to load";

        showMessage(
          "<span class='error'>❌ Zoning files failed to load.</span><br><br>" +
          "Make sure these files are in the same GitHub folder as index.html:<br>" +
          "<b>high.json</b><br>" +
          "<b>middle.json</b><br>" +
          "<b>elementary.json</b><br><br>" +
          "<span class='small'>Open your browser Console with F12 to see the exact error.</span>"
        );
      }
    }

    loadZones();

    // ---------------- GEOCODING ----------------
    async function geocodeAddress(address) {
      const searchText = `${address}, Pasadena, CA, USA`;

      const url =
        "https://nominatim.openstreetmap.org/search" +
        "?format=json" +
        "&limit=5" +
        "&addressdetails=1" +
        "&countrycodes=us" +
        "&q=" + encodeURIComponent(searchText);

      const response = await fetch(url, {
        headers: { Accept: "application/json" }
      });

      if (!response.ok) {
        throw new Error("Address search failed. Please try again.");
      }

      const results = await response.json();

      if (!results || results.length === 0) {
        return null;
      }

      const pasadenaResult = results.find(result => {
        const a = result.address || {};
        const city = a.city || a.town || a.village || a.hamlet || "";
        return city.toLowerCase().includes("pasadena");
      });

      const best = pasadenaResult || results[0];

      return {
        lat: Number(best.lat),
        lng: Number(best.lon),
        label: best.display_name || searchText
      };
    }

      const x = point[0]; // longitude
      const y = point[1]; // latitude
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
