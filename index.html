<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    input, select, button { display:block; width:360px; padding:10px; margin:10px 0; }
    #map { height:500px; margin-top:15px; }
    #box { margin-top:10px; padding:12px; border:1px solid #ccc; background:#f9f9f9; }
  </style>
</head>

<body>
<h2>Pasadena Zoned School Locator</h2>

<input id="address" placeholder="Enter address" />
<select id="level">
  <option value="High">High School</option>
  <option value="Middle">Middle School</option>
  <option value="Elementary">Elementary School</option>
</select>

<button onclick="findSchool()">Find School</button>

<div id="box">Loading zoning data...</div>
<div id="map"></div>

<script>

const zoneFiles = {
  High: "./high.json",
  Middle: "./middle.json",
  Elementary: "./elementary.json"
};

// ===== ADD SCHOOL INFO HERE =====
const schoolInfo = {
  "Octavia E. Butler Middle School": {
    description: "Add your description here.",
    address: "",
    phone: "",
    grades: "6–8",
    website: ""
  },

  "Blair High School": {
    description: "Add your description here.",
    address: "",
    phone: "",
    grades: "9–12",
    website: ""
  },

  "John Muir High School": {
    description: "Add your description here.",
    address: "",
    phone: "",
    grades: "9–12",
    website: ""
  },

  "Pasadena High School": {
    description: "PHS offers a variety of outstanding curricular and extra-curricular programs.
Advanced Placement classes, language courses, college-level Math Academy courses,
and strong athletic programs.",
    address: "2925 E Sierra Madre Blvd",
    phone: "(626) 396-5880",
    grades: "9–12",
    website: ""
  }
};

const zones = { High: [], Middle: [], Elementary: [] };
let zonesLoaded;

const map = L.map("map").setView([34.1478, -118.1445], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let marker;

function show(msg){ document.getElementById("box").innerHTML = msg; }

async function loadZones(){
  try{
    const [h,m,e] = await Promise.all([
      fetch(zoneFiles.High).then(r=>r.json()),
      fetch(zoneFiles.Middle).then(r=>r.json()),
      fetch(zoneFiles.Elementary).then(r=>r.json())
    ]);

    zones.High = h.features;
    zones.Middle = m.features;
    zones.Elementary = e.features;

    show("✅ Zoning data loaded");
  }catch(err){
    show("❌ Failed loading JSON files");
  }
}

zonesLoaded = loadZones();

async function geocode(address){
  const url = "https://nominatim.openstreetmap.org/search?format=json&q="+
    encodeURIComponent(address+", Pasadena CA");

  const res = await fetch(url);
  const data = await res.json();

  if(data.length){
    return { lat:+data[0].lat, lng:+data[0].lon };
  }
  return null;
}

function pointInPolygon(p, vs){
  let [x,y]=p, inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let [xi,yi]=vs[i], [xj,yj]=vs[j];
    let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

function findZoned(lat,lng,level){
  for(let z of zones[level]){
    let geom=z.geometry;
    let polys = geom.type==="Polygon"?[geom.coordinates]:geom.coordinates;

    for(let poly of polys){
      let ring=poly[0];
      if(pointInPolygon([lng,lat], ring)){
        return z.properties.name;
      }
    }
  }
  return null;
}

function formatDescription(text){
  return text.replaceAll("\n","<br>");
}

async function findSchool(){
  await zonesLoaded;

  const addr=document.getElementById("address").value;
  const level=document.getElementById("level").value;

  const geo=await geocode(addr);
  if(!geo){ show("❌ Address not found"); return; }

  if(marker) map.removeLayer(marker);
  marker=L.marker([geo.lat,geo.lng]).addTo(map);
  map.setView([geo.lat,geo.lng],14);

  const school=findZoned(geo.lat,geo.lng,level);

  if(!school){ show("❌ No zoned school found"); return; }

  const info = schoolInfo[school] || {};

  show(
    "<b>School:</b> "+school+"<br>"+
    "<b>Description:</b><br>"+(info.description?formatDescription(info.description):"N/A")+"<br><br>"+
    "<b>Address:</b> "+(info.address||"N/A")+"<br>"+
    "<b>Phone:</b> "+(info.phone||"N/A")+"<br>"+
    "<b>Grades:</b> "+(info.grades||"N/A")
  );
}

</script>
</body>
</html>
