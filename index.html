  <script>
    window.addEventListener("error", function(event) {
      const message = event.message || "Unknown JavaScript error";
      const line = event.lineno ? " Line: " + event.lineno : "";
      window.__pageError = message + line;

      setTimeout(function() {
        const box = document.getElementById("box");
        if (box) {
          box.innerHTML =
            "<span style='color:#b00020;font-weight:bold;'>❌ Page error:</span><br>" +
            String(window.__pageError);
        }
      }, 300);
    });

    window.addEventListener("unhandledrejection", function(event) {
      const message = event.reason && event.reason.message ? event.reason.message : String(event.reason || "Unknown promise error");
      window.__pageError = message;

      setTimeout(function() {
        const box = document.getElementById("box");
        if (box) {
          box.innerHTML =
            "<span style='color:#b00020;font-weight:bold;'>❌ Loading error:</span><br>" +
            String(window.__pageError);
        }
      }, 300);
    });
  </script>

    };

    // =====================================================
    // ADDRESS CORRECTIONS CSV
    // Optional file in GitHub: address-corrections.csv
    // New cleaner format:
    // street,level,school,start,end,type,direction
    // lake ave,Elementary,Altadena Elementary School,1200,1400,all,
    // worcester ave,Elementary,Washington Accelerated School,912,1122,even,e
    // worcester ave,Elementary,Washington Accelerated School,913,1133,odd,e
    //
    // type can be: all, even, or odd
    // direction can be blank, n, s, e, or w
    // =====================================================
    const addressCorrectionsFile = "./address-corrections.csv";
    const addressRangesFile = "./address-ranges.csv";
    let addressRangeCorrections = [];
    let addressRanges = [];
    let csvIssueResults = [];

    
    // =====================================================
    // APP STATE
    // =====================================================
    const zones = {
      High: [],
      Middle: [],
      Elementary: []
    };

    let zonesLoaded = null;
    let zonesAreLoaded = false;
    let userMarker = null;
    let selectedZoneLayer = null;
    let districtBoundaryLayer = null;
    let districtBounds = null;

    const box = document.getElementById("box");
    const findBtn = document.getElementById("findBtn");
    const scanCsvBtn = document.getElementById("scanCsvBtn");
    const downloadCsvIssuesBtn = document.getElementById("downloadCsvIssuesBtn");

    const map = L.map("map").setView([34.1478, -118.1445], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // =====================================================
    // BASIC HELPERS
    // =====================================================
    function showMessage(html) {
      box.innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDescription(text) {
      return escapeHtml(text || "No description has been added yet.").replaceAll("\n", "<br>");
    }

    function makeWebsiteLink(url) {
      if (!url) return "";

      return (
        "<p><b>Website:</b> " +
        "<a href='" + escapeHtml(url) + "' target='_blank' rel='noopener noreferrer'>School website</a>" +
        "</p>"
      );
    }

    function normalizeAddressText(text) {
      return String(text || "")
        .toLowerCase()
        .replaceAll("north", "n")
        .replaceAll("south", "s")
        .replaceAll("east", "e")
        .replaceAll("west", "w")
        .replaceAll("avenue", "ave")
        .replaceAll("street", "st")
        .replaceAll("road", "rd")
        .replaceAll("boulevard", "blvd")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function getAddressNumber(address) {
      const text = String(address || "").trim();
      const match = text.match(/^[0-9]+/);
      return match ? Number(match[0]) : null;
    }

    function getAddressDirection(address) {
      const normalized = " " + normalizeAddressText(address) + " ";

      if (normalized.includes(" n ")) return "n";
      if (normalized.includes(" s ")) return "s";
      if (normalized.includes(" e ")) return "e";
      if (normalized.includes(" w ")) return "w";

      return "";
    }

    function getAddressRangeCorrection(address, level) {
      const number = getAddressNumber(address);
      if (!number) return null;

      const normalizedAddress = normalizeAddressText(address);
      const addressDirection = getAddressDirection(address);

      for (const item of addressRangeCorrections) {
        if (item.level !== level) continue;
        if (!normalizedAddress.includes(normalizeAddressText(item.street))) continue;
        if (number < item.start || number > item.end) continue;

        const type = String(item.type || "all").toLowerCase();
        const ruleDirection = String(item.direction || "").toLowerCase();

        // If the CSV direction is blank, the rule applies to all directions.
        // If the CSV direction is n/s/e/w, the typed address must match it.
        if (ruleDirection && ruleDirection !== addressDirection) continue;

        if (type === "all") {
          return item.school;
        }

        if (type === "even" && number % 2 === 0) {
          return item.school;
        }

        if (type === "odd" && number % 2 === 1) {
          return item.school;
        }
      }

      return null;
    }

    // =====================================================
    // LOAD GEOJSON FILES
    // =====================================================
    async function fetchJson(path) {
      const response = await fetch(path + "?v=" + Date.now(), {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(path + " failed to load. Status: " + response.status);
      }

      return await response.json();
    }

    async function loadAddressCorrections() {
      try {
        const response = await fetch(addressCorrectionsFile + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          addressRangeCorrections = [];
          console.log("No address-corrections.csv found. Continuing without corrections.");
          return;
        }

        const csvText = await response.text();
        addressRangeCorrections = parseAddressCorrectionsCsv(csvText);
        console.log("Loaded address corrections:", addressRangeCorrections);
      } catch (error) {
        addressRangeCorrections = [];
        console.warn("Address corrections CSV could not be loaded:", error);
      }
    }

    async function loadAddressRanges() {
      try {
        const response = await fetch(addressRangesFile + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          addressRanges = [];
          console.log("No address-ranges.csv found. Geocoder will be used normally.");
          return;
        }

        const csvText = await response.text();
        addressRanges = parseAddressRangesCsv(csvText);
        console.log("Loaded address ranges:", addressRanges.length);
      } catch (error) {
        addressRanges = [];
        console.warn("Address ranges CSV could not be loaded:", error);
      }
    }

    function parseCsvRows(csvText) {
      return csvText
        .replaceAll(String.fromCharCode(13), "")
        .split(String.fromCharCode(10))
        .map(line => line.trim())
        .filter(line => line && !line.startsWith("#"));
    }

    function splitDataLine(line) {
      // Supports normal comma CSV and Excel/Sheets tab-separated paste/export.
      if (line.includes(String.fromCharCode(9))) {
        return line.split(String.fromCharCode(9)).map(value => value.trim());
      }

      return line.split(",").map(value => value.trim());
    }

    function parseAddressCorrectionsCsv(csvText) {
      const lines = parseCsvRows(csvText);

      if (lines.length <= 1) return [];

      const headers = splitDataLine(lines[0]).map(header => header.trim().toLowerCase());
      const corrections = [];

      for (let i = 1; i < lines.length; i++) {
        const values = splitDataLine(lines[i]);
        const row = {};

        headers.forEach(function(header, index) {
          row[header] = values[index] || "";
        });

        if (row.street && row.level && row.school && row.start && row.end) {
          corrections.push({
            street: row.street,
            level: row.level,
            school: row.school,
            start: Number(row.start),
            end: Number(row.end),
            type: row.type || "all",
            direction: row.direction || ""
          });
          continue;
        }

        if (row.street && row.level && row.school && row.evenstart && row.evenend) {
          corrections.push({
            street: row.street,
            level: row.level,
            school: row.school,
            start: Number(row.evenstart),
            end: Number(row.evenend),
            type: "even",
            direction: row.direction || ""
          });
        }

        if (row.street && row.level && row.school && row.oddstart && row.oddend) {
          corrections.push({
            street: row.street,
            level: row.level,
            school: row.school,
            start: Number(row.oddstart),
            end: Number(row.oddend),
            type: "odd",
            direction: row.direction || ""
          });
        }
      }

      return corrections.filter(item =>
        item.street &&
        item.level &&
        item.school &&
        Number.isFinite(item.start) &&
        Number.isFinite(item.end) &&
        ["all", "even", "odd"].includes(String(item.type || "all").toLowerCase()) &&
        ["", "n", "s", "e", "w"].includes(String(item.direction || "").toLowerCase())
      );
    }

    function normalizeHeader(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "")
        .trim();
    }

    function cleanRangeType(value) {
      const text = String(value || "").trim().toLowerCase();

      if (text === "e" || text === "even") return "even";
      if (text === "o" || text === "odd") return "odd";

      // Blank, ALL, both, or anything unclear should apply to both odd and even.
      return "all";
    }

    function addressMatchesOddEven(number, type) {
      const cleanType = cleanRangeType(type);

      if (cleanType === "even") return number % 2 === 0;
      if (cleanType === "odd") return number % 2 !== 0;

      return true;
    }

    function cleanRangeDirection(value) {
      const text = String(value || "").trim().toLowerCase();
      if (["n", "s", "e", "w"].includes(text)) return text;
      return "";
    }

    function parseAddressRangesCsv(csvText) {
      const lines = parseCsvRows(csvText);
      if (lines.length <= 1) return [];

      const headers = splitDataLine(lines[0]).map(header => normalizeHeader(header));
      const ranges = [];

      for (let i = 1; i < lines.length; i++) {
        const values = splitDataLine(lines[i]);
        const row = {};

        headers.forEach(function(header, index) {
          row[header] = values[index] || "";
        });

        const low = Number(row.lownumber || row.low || row.start);
        const highNumber = Number(row.highnumber || row.end);
        const type = cleanRangeType(row.oe || row.type || row.oddeven);
        const direction = cleanRangeDirection(row.dir || row.direction);
        const street = row.streetname || row.street;
        const city = row.cityname || row.city;
        const zip = row.zipcode || row.zip;
        const elementary = row.elementary || row.elementaryschool;
        const middle = row.middle || row.middleschool;
        const highSchool = row.highschool || row.high;

        if (!Number.isFinite(low) || !Number.isFinite(highNumber) || !street) continue;

        ranges.push({
          low: low,
          highNumber: highNumber,
          type: type,
          direction: direction,
          street: street,
          city: city,
          zip: zip,
          elementary: elementary || "",
          middle: middle || "",
          highSchool: highSchool || ""
        });
      }

      return ranges;
    }

    function addressHasCityOrZip(address) {
      const text = String(address || "").toLowerCase();
      const zipPattern = new RegExp("\b\d{5}\b");
      return (
        text.includes("pasadena") ||
        text.includes("altadena") ||
        text.includes("sierra madre") ||
        text.includes("san gabriel") ||
        text.includes("south pasadena") ||
        text.includes("ca") ||
        zipPattern.test(text)
      );
    }

    function extractTypedZip(address) {
      const match = String(address || "").match(new RegExp("\b\d{5}\b"));
      return match ? match[0] : "";
    }

    function extractTypedCity(address) {
      const text = String(address || "").toLowerCase();
      const cities = [
        "pasadena",
        "altadena",
        "sierra madre",
        "san gabriel",
        "south pasadena",
        "la crescenta",
        "glendale",
        "arcadia",
        "los angeles"
      ];

      for (const city of cities) {
        if (text.includes(city)) return city;
      }

      return "";
    }

    function isPusdAreaCity(city) {
      const normalized = String(city || "").toLowerCase();
      return [
        "pasadena",
        "altadena",
        "sierra madre",
        "san gabriel"
      ].includes(normalized);
    }

    function geocoderMatchesTypedCityOrZip(address, location) {
      const typedZip = extractTypedZip(address);
      const typedCity = extractTypedCity(address);
      const label = String(location && location.label ? location.label : "").toLowerCase();

      if (typedZip && !label.includes(typedZip)) return false;
      if (typedCity && !label.includes(typedCity)) return false;

      return true;
    }

    function findAddressRangeMatch(address) {
      const number = getAddressNumber(address);
      if (!number || addressRanges.length === 0) return null;

      const normalizedAddress = normalizeAddressText(address);
      const addressDirection = String(getAddressDirection(address) || "").toLowerCase();

      let bestMatch = null;
      const possibleMatches = [];

      for (const item of addressRanges) {
        const streetName = normalizeAddressText(item.street);
        if (!streetName) continue;

        // 1. Street must match.
        if (!normalizedAddress.includes(streetName)) continue;

        // 2. Direction must match if the CSV row has a direction.
        const itemDirection = String(item.direction || "").toLowerCase();
        if (itemDirection && itemDirection !== addressDirection) continue;

        // 3. Address number must be inside this row's range.
        if (number < item.low || number > item.highNumber) continue;

        // 4. Odd/even must match.
        // This is critical for streets where one side of the street has a different school.
        if (!addressMatchesOddEven(number, item.type)) continue;

        possibleMatches.push(item);
      }

      // If multiple rows match, choose the smallest range.
      // This automatically handles overlapping ranges by trusting the most specific one.
      for (const item of possibleMatches) {
        if (!bestMatch) {
          bestMatch = item;
          continue;
        }

        const itemSize = item.highNumber - item.low;
        const bestSize = bestMatch.highNumber - bestMatch.low;

        if (itemSize < bestSize) {
          bestMatch = item;
        }
      }

      return bestMatch;
    }

    function detectCsvRangeIssues() {
      const issues = [];

      for (let i = 0; i < addressRanges.length; i++) {
        const a = addressRanges[i];

        if (!a.street || !Number.isFinite(a.low) || !Number.isFinite(a.highNumber)) {
          issues.push("Row " + (i + 2) + ": missing street or invalid number range.");
          continue;
        }

        if (a.low > a.highNumber) {
          issues.push("Row " + (i + 2) + ": Low Number is greater than High Number.");
        }

        for (let j = i + 1; j < addressRanges.length; j++) {
          const b = addressRanges[j];

          const sameStreet = normalizeAddressText(a.street) === normalizeAddressText(b.street);
          const sameDirection = String(a.direction || "").toLowerCase() === String(b.direction || "").toLowerCase();
          const sameCity = normalizeAddressText(a.city || "") === normalizeAddressText(b.city || "");
          const sameZip = String(a.zip || "").trim() === String(b.zip || "").trim();
          const sameType = String(a.type || "all").toLowerCase() === String(b.type || "all").toLowerCase();

          if (!sameStreet || !sameDirection || !sameCity || !sameZip || !sameType) continue;

          const overlaps = a.low <= b.highNumber && b.low <= a.highNumber;

          if (overlaps) {
            const sameSchools =
              normalizeSchoolForCompare(a.elementary) === normalizeSchoolForCompare(b.elementary) &&
              normalizeSchoolForCompare(a.middle) === normalizeSchoolForCompare(b.middle) &&
              normalizeSchoolForCompare(a.highSchool) === normalizeSchoolForCompare(b.highSchool);

            if (!sameSchools) {
              issues.push(
                "Possible overlap: rows " + (i + 2) + " and " + (j + 2) +
                " both cover " + a.street + " but have different schools."
              );
            }
          }
        }
      }

      return issues;
    }

    async function loadZones() {
      try {
        zonesAreLoaded = false;
        findBtn.disabled = true;
        findBtn.textContent = "Loading zoning data...";

        showMessage("Loading <b>high.json</b>...");
        const highData = await fetchJson(zoneFiles.High);

        showMessage("✅ high.json loaded<br>Loading <b>middle.json</b>...");
        const middleData = await fetchJson(zoneFiles.Middle);

        showMessage("✅ high.json loaded<br>✅ middle.json loaded<br>Loading <b>elementary.json</b>...");
        const elementaryData = await fetchJson(zoneFiles.Elementary);

        zones.High = highData.features || [];
        zones.Middle = middleData.features || [];
        zones.Elementary = elementaryData.features || [];

        showMessage("✅ high.json loaded<br>✅ middle.json loaded<br>✅ elementary.json loaded<br>Loading optional CSV files...");
        await loadAddressCorrections();
        await loadAddressRanges();

        districtBounds = calculateDistrictBounds();

        zonesAreLoaded = true;
        findBtn.disabled = false;
        findBtn.textContent = "Find School";
        scanCsvBtn.disabled = false;

        console.log("Loaded zones:", {
          High: zones.High.length,
          Middle: zones.Middle.length,
          Elementary: zones.Elementary.length,
          districtBounds: districtBounds
        });

        drawDistrictBoundary();

        showMessage(
          "<span class='success'>✅ Zoning data loaded.</span><br>" +
          "High zones: " + zones.High.length + "<br>" +
          "Middle zones: " + zones.Middle.length + "<br>" +
          "Elementary zones: " + zones.Elementary.length + "<br><br>" +
          "Enter an address and choose a school level."
        );
      } catch (error) {
        console.error("Zone loading error:", error);

        zonesAreLoaded = false;
        findBtn.disabled = true;
        findBtn.textContent = "Zoning files failed to load";

        showMessage(
          "<span class='error'>❌ Zoning files failed to load.</span><br><br>" +
          escapeHtml(error.message || error) +
          "<br><br>Make sure these files are in the same GitHub folder as index.html:<br>" +
          "<b>high.json</b><br>" +
          "<b>middle.json</b><br>" +
          "<b>elementary.json</b>"
        );
      }
    }

    zonesLoaded = loadZones();

    // =====================================================
    // GEOMETRY HELPERS
    // =====================================================
    function pointInRing(point, ring) {
      const x = point[0];
      const y = point[1];
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
        const yj = ring[j][1];

        const intersect =
          ((yi > y) !== (yj > y)) &&
          (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi);

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function pointInPolygon(point, polygon) {
      if (!polygon || polygon.length === 0) return false;

      const outerRing = polygon[0];
      if (!outerRing || outerRing.length < 3) return false;

      if (!pointInRing(point, outerRing)) return false;

      for (let i = 1; i < polygon.length; i++) {
        const hole = polygon[i];
        if (hole && hole.length >= 3 && pointInRing(point, hole)) {
          return false;
        }
      }

      return true;
    }

    function getFeaturePolygons(feature) {
      const geometry = feature.geometry;
      if (!geometry) return [];

      if (geometry.type === "Polygon") {
        return [geometry.coordinates];
      }

      if (geometry.type === "MultiPolygon") {
        return geometry.coordinates;
      }

      return [];
    }

    function calculateDistrictBounds() {
      let minLng = Infinity;
      let minLat = Infinity;
      let maxLng = -Infinity;
      let maxLat = -Infinity;

      for (const level of ["High", "Middle", "Elementary"]) {
        for (const feature of zones[level]) {
          const polygons = getFeaturePolygons(feature);

          for (const polygon of polygons) {
            for (const ring of polygon) {
              for (const coordinate of ring) {
                const lng = coordinate[0];
                const lat = coordinate[1];

                if (lng < minLng) minLng = lng;
                if (lat < minLat) minLat = lat;
                if (lng > maxLng) maxLng = lng;
                if (lat > maxLat) maxLat = lat;
              }
            }
          }
        }
      }

      if (!isFinite(minLng) || !isFinite(minLat) || !isFinite(maxLng) || !isFinite(maxLat)) {
        return null;
      }

      const padding = 0.01;
      return {
        minLng: minLng - padding,
        minLat: minLat - padding,
        maxLng: maxLng + padding,
        maxLat: maxLat + padding
      };
    }

    function pointInsideDistrictBounds(lat, lng) {
      if (!districtBounds) return true;

      return (
        lng >= districtBounds.minLng &&
        lng <= districtBounds.maxLng &&
        lat >= districtBounds.minLat &&
        lat <= districtBounds.maxLat
      );
    }

    // =====================================================
    // SCHOOL LOOKUP
    // =====================================================
    function getSchoolName(properties) {
      if (!properties) return "Unknown School";

      const rawName = (
        properties.name ||
        properties.Name ||
        properties.SCHOOL ||
        properties.School ||
        properties.school ||
        properties.SCHOOLNAME ||
        properties.SCHOOL_NAME ||
        properties.school_name ||
        properties.SITE_NAME ||
        properties.site_name ||
        "Unknown School"
      );

      return schoolNameFixes[rawName] || rawName;
    }

    function getSchoolDetails(schoolName) {
      return schoolInfo[schoolName] || {
        description: "No description has been added yet.",
        address: "N/A",
        phone: "N/A",
        grades: "N/A",
        website: ""
      };
    }

    function getZonesForLevel(level) {
      const elementaryData =
        (typeof elementaryGeoJson !== "undefined" && elementaryGeoJson) ? elementaryGeoJson :
        (typeof elementaryZones !== "undefined" && elementaryZones) ? elementaryZones :
        (typeof zonesByLevel !== "undefined" && zonesByLevel && zonesByLevel.Elementary) ? zonesByLevel.Elementary :
        null;

      const middleData =
        (typeof middleGeoJson !== "undefined" && middleGeoJson) ? middleGeoJson :
        (typeof middleZones !== "undefined" && middleZones) ? middleZones :
        (typeof zonesByLevel !== "undefined" && zonesByLevel && zonesByLevel.Middle) ? zonesByLevel.Middle :
        null;

      const highData =
        (typeof highGeoJson !== "undefined" && highGeoJson) ? highGeoJson :
        (typeof highZones !== "undefined" && highZones) ? highZones :
        (typeof zonesByLevel !== "undefined" && zonesByLevel && zonesByLevel.High) ? zonesByLevel.High :
        null;

      if (level === "Elementary") return elementaryData;
      if (level === "Middle") return middleData;
      if (level === "High") return highData;
      return null;
    }

    function findZonedSchool(lat, lng, level) {
      const levelZones = zones[level];
      if (!levelZones || levelZones.length === 0) return null;

      const tolerance = 0.0005;

      const testPoints = [
        [lng, lat],
        [lng + tolerance, lat],
        [lng - tolerance, lat],
        [lng, lat + tolerance],
        [lng, lat - tolerance],
        [lng + tolerance, lat + tolerance],
        [lng - tolerance, lat - tolerance],
        [lng + tolerance, lat - tolerance],
        [lng - tolerance, lat + tolerance]
      ];

      const voteCounts = {};
      const featureMap = {};

      for (const zone of levelZones) {
        const polygons = getFeaturePolygons(zone);

        for (const polygon of polygons) {
          for (const point of testPoints) {
            if (pointInPolygon(point, polygon)) {
              const name = getSchoolName(zone.properties);

              voteCounts[name] = (voteCounts[name] || 0) + 1;
              featureMap[name] = zone;
            }
          }
        }
      }

      let bestSchool = null;
      let bestCount = 0;

      for (const name in voteCounts) {
        if (voteCounts[name] > bestCount) {
          bestSchool = name;
          bestCount = voteCounts[name];
        }
      }

      if (bestSchool) {
        return {
          name: bestSchool,
          feature: featureMap[bestSchool]
        };
      }

      return null;
    }

    function pointInsideAnyPusdZone(lat, lng) {
      const allZoneFiles = [
        getZonesForLevel("Elementary"),
        getZonesForLevel("Middle"),
        getZonesForLevel("High")
      ];

      for (const zones of allZoneFiles) {
        if (!zones || !zones.features) continue;

        for (const feature of zones.features) {
          if (pointInFeature(lat, lng, feature)) {
            return true;
          }
        }
      }

      return false;
    }

    // =====================================================
    // GEOCODING
    // =====================================================
    async function geocodeAddress(address, level) {
      const query = String(address || "").trim();
      if (!query) return null;

      const url =
        "https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates" +
        "?f=json" +
        "&maxLocations=5" +
        "&outFields=Match_addr,Addr_type,Score" +
        "&countryCode=USA" +
        "&singleLine=" + encodeURIComponent(query);

      const response = await fetch(url);
      if (!response.ok) return null;

      const data = await response.json();
      const candidates = data && data.candidates ? data.candidates : [];
      if (!candidates.length) return null;

      let bestCandidate = null;
      let bestScore = -1;

      for (const candidate of candidates) {
        if (!candidate || !candidate.location) continue;

        const lat = candidate.location.y;
        const lng = candidate.location.x;
        const score = Number(candidate.score || 0);

        // Prefer candidates that actually fall inside any uploaded PUSD zone.
        const insidePusd = pointInsideAnyPusdZone(lat, lng);
        const adjustedScore = insidePusd ? score + 1000 : score;

        if (adjustedScore > bestScore) {
          bestScore = adjustedScore;
          bestCandidate = candidate;
        }
      }

      if (!bestCandidate || !bestCandidate.location) return null;

      return {
        lat: bestCandidate.location.y,
        lng: bestCandidate.location.x,
        label: bestCandidate.address || bestCandidate.attributes?.Match_addr || query,
        source: "ArcGIS",
        matchQuality: bestCandidate.attributes?.Addr_type || "geocoder"
      };
    }

    // =====================================================
    // MAIN BUTTON ACTION
    // =====================================================
    async function findSchool() {
      try {
        await zonesLoaded;

        if (!zonesAreLoaded) {
          showMessage("<span class='error'>❌ Zoning data is not loaded yet.</span>");
          return;
        }

        const address = document.getElementById("address").value.trim();
        const level = document.getElementById("level").value;
        const rangeCorrection = getAddressRangeCorrection(address, level);

        if (!address) {
          alert("Please enter an address.");
          return;
        }

        const rangeMatch = findAddressRangeMatch(address);

        if (addressRanges.length > 0 && !rangeMatch && !addressHasCityOrZip(address)) {
          showMessage(
            "<span class='error'>❌ Address needs city or ZIP.</span><br><br>" +
            "This address was not found in <b>address-ranges.csv</b>. To avoid a wrong geocoder match, please enter the full address with city or ZIP code.<br><br>" +
            "Example:<br>" +
            "<b>3907 La Crescenta Ave, Glendale, CA 91214</b><br>" +
            "or<br>" +
            "<b>3907 La Crescenta Ave, Pasadena, CA 91107</b>"
          );
          return;
        }

        showMessage("Checking CSV and map boundaries side-by-side... Please wait.");

        const location = await geocodeAddress(address, level);

        if (!location) {
          showMessage(
            "<span class='error'>❌ Address not found.</span><br>" +
            "Try entering the full address with ZIP code."
          );
          return;
        }

        if (addressRanges.length > 0 && !rangeMatch) {
          const typedCity = extractTypedCity(address);
          const cityOrZipMatches = geocoderMatchesTypedCityOrZip(address, location);

          if (!isPusdAreaCity(typedCity) || !cityOrZipMatches) {
            showMessage(
              "<span class='error'>❌ Address not found in PUSD.</span><br><br>" +
              "This address was not found in <b>address-ranges.csv</b>, and the typed city/ZIP does not match a trusted PUSD-area geocoder result.<br><br>" +
              "<b>You typed:</b><br>" + escapeHtml(address) + "<br><br>" +
              "<b>Geocoder returned:</b><br>" + escapeHtml(location.label || "Unknown") + "<br><br>" +
              "If this is truly inside PUSD, add the address range to <b>address-ranges.csv</b> or enter the full official address with Pasadena, Altadena, Sierra Madre, or San Gabriel and ZIP code."
            );
            return;
          }
        }

        drawSearchPoint(location.lat, location.lng, location.label);
        showMessage("Checking school boundary...");

        const insidePUSD = pointInsideAnyPusdZone(location.lat, location.lng);

        if (!insidePUSD) {
          showMessage(
            "<span class='error'>❌ Address is outside Pasadena Unified School District boundaries.</span><br><br>" +
            "<b>Geocoded location:</b><br>" + escapeHtml(location.label) +
            "<br>Lat: " + location.lat.toFixed(6) +
            ", Lng: " + location.lng.toFixed(6)
          );
          return;
        }

        const elementaryResult = findZonedSchool(location.lat, location.lng, "Elementary");
        const middleResult = findZonedSchool(location.lat, location.lng, "Middle");
        const highResult = findZonedSchool(location.lat, location.lng, "High");

        const geoResults = {
          elementary: elementaryResult ? elementaryResult.name : "",
          middle: middleResult ? middleResult.name : "",
          high: highResult ? highResult.name : ""
        };

        const selectedResult =
          level === "Elementary" ? elementaryResult :
          level === "Middle" ? middleResult :
          highResult;

        if (selectedResult) {
          drawSelectedZone(selectedResult.feature);
        }

        showMessage(buildComparisonCard(rangeMatch, geoResults, location));
      } catch (error) {
        console.error(error);
        showMessage(
          "<span class='error'>❌ Error:</span><br>" +
          escapeHtml(error.message || error)
        );
      }
    }
  </script>
