<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pasadena Zoned School Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    #map { height: 500px; margin-top: 15px; }
    #box { margin-top: 10px; padding: 12px; border: 1px solid #ccc; width: 520px; background: #f9f9f9; }
    input, select, button { padding: 8px; margin: 5px 0; width: 320px; }
  </style>
</head>

<body>

<h2>Pasadena Zoned School Locator</h2>

<input id="address" placeholder="Enter address" />
<br>

<select id="level">
  <option value="High">High School</option>
  <option value="Middle">Middle School</option>
  <option value="Elementary">Elementary School</option>
</select>

<br>

<button onclick="findSchool()">Find School</button>

<div id="box">Enter an address to begin</div>
<div id="map"></div>

<script>

// ---------------- MAP ----------------
const map = L.map("map").setView([34.1478, -118.1445], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

let userMarker;

// ---------------- DATA ----------------
let zones = { High: [], Middle: [], Elementary: [] };

// ---------------- LOAD ZONES ----------------
async function loadZones() {

  const [h, m, e] = await Promise.all([
    fetch("high.json").then(r => r.json()),
    fetch("middle.json").then(r => r.json()),
    fetch("elementary.json").then(r => r.json())
  ]);

  zones.High = h.features;
  zones.Middle = m.features;
  zones.Elementary = e.features;

  console.log("Zones loaded:", zones);
}

loadZones();

// ---------------- GEOCODE (stable) ----------------
async function geocode(address) {

  const url =
    "https://photon.komoot.io/api/?q=" +
    encodeURIComponent(address + " Pasadena CA");

  const res = await fetch(url);
  const data = await res.json();

  if (data.features && data.features.length > 0) {
    const c = data.features[0].geometry.coordinates;
    return { lat: c[1], lon: c[0] };
  }

  return null;
}

// ---------------- POINT IN POLYGON ----------------
function pointInPolygon(point, vs) {

  const x = point[0], y = point[1];
  let inside = false;

  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {

    const xi = vs[i][0], yi = vs[i][1];
    const xj = vs[j][0], yj = vs[j][1];

    const intersect =
      ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

// ---------------- ZONING ENGINE (FIXED) ----------------
function findZonedSchool(lat, lng, level) {

  const levelZones = zones[level];

  if (!levelZones || levelZones.length === 0) {
    console.log("No zones loaded for:", level);
    return null;
  }

  for (let zone of levelZones) {

    const geom = zone.geometry;

    let polygons = [];

    // Normalize Polygon vs MultiPolygon
    if (geom.type === "Polygon") {
      polygons = [geom.coordinates];
    } else if (geom.type === "MultiPolygon") {
      polygons = geom.coordinates;
    }

    for (let poly of polygons) {

      const ring = poly[0];

      // SAFETY CHECK (prevents silent failures)
      if (!ring || ring.length < 3) continue;

      // IMPORTANT: GeoJSON is [lng, lat]
      if (pointInPolygon([lng, lat], ring)) {

        const props = zone.properties || {};

        return (
          props.name ||
          props.Name ||
          props.SCHOOL ||
          props.school ||
          "Unknown School"
        );
      }
    }
  }

  return null;
}

// ---------------- MAIN ----------------
async function findSchool() {

  const address = document.getElementById("address").value;
  const level = document.getElementById("level").value;

  if (!address) return alert("Enter address");

  document.getElementById("box").innerHTML = "Searching...";

  const geo = await geocode(address);

  if (!geo) {
    document.getElementById("box").innerHTML = "❌ Address not found";
    return;
  }

  const lat = geo.lat;
  const lng = geo.lon;

  // marker
  if (userMarker) map.removeLayer(userMarker);

  userMarker = L.marker([lat, lng])
    .addTo(map)
    .bindPopup("Search Location")
    .openPopup();

  map.setView([lat, lng], 13);

  // zoning
  const school = findZonedSchool(lat, lng, level);

  console.log("Result:", school);

  if (!school) {
    document.getElementById("box").innerHTML =
      "❌ No zoned school found (check GeoJSON alignment)";
    return;
  }

  document.getElementById("box").innerHTML =
    "<b>Zoned School:</b> " + school;
}

</script>

</body>
</html>
